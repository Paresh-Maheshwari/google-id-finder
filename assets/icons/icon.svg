<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4285f4"/>
      <stop offset="100%" style="stop-color:#1557b0"/>
    </linearGradient>
    <clipPath id="lens">
      <circle cx="50" cy="52" r="24"/>
    </clipPath>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Person clipped inside magnifying glass -->
  <g clip-path="url(#lens)">
    <circle cx="50" cy="42" r="8" fill="white"/>
    <ellipse cx="50" cy="66" rx="13" ry="10" fill="white"/>
  </g>
  <!-- Magnifying glass ring -->
  <circle cx="50" cy="52" r="24" fill="none" stroke="white" stroke-width="5"/>
  <!-- Handle -->
  <line x1="68" y1="70" x2="100" y2="102" stroke="white" stroke-width="7" stroke-linecap="round"/>
</svg>
